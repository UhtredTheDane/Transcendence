<!DOCTYPE html>
<html lang="en">
<head>
	<title>Pong</title>
	<meta charset="UTF-8">
</head>
<body>
<h1>Canvas</h1>
	<canvas id="field" width="802px" height="455" style="border: 1px solid black;">
		Votre Navigateur ne supporte pas la balise canvas.
	</canvas>


<script>
	var pos1x = 0;
	var pos1y = 167.5;
	var pos2x = 785;
	var pos2y = 167.5;
	var ballx = 384;
	var bally = 212.5;
	var speed1y = 0;
	var speed2y = 0;
	var canevas = document.getElementById("field");
	var contexte = canevas.getContext("2d");
	var images_nb = 3;
	var player1 = new Image();
	var player2 = new Image();
	var ball = new Image();
	player1.onload = player2.onload = ball.onload = function() {
		if (--images_nb > 0) return;
			contexte.drawImage(player1, pos1x, pos1y);
			contexte.drawImage(player2, pos2x, pos2y);
			contexte.drawImage(ball, ballx, bally);
	};
	player1.src = 'textures/Player1.png';
	player2.src = 'textures/Player2.png';
	ball.src = 'textures/Ball.png';
	document.addEventListener('keydown', function(event) {
		if (event.key == 'ArrowUp') {
			speed2y = -5;
		}
		else if (event.key == 'ArrowDown') {
			speed2y = 5;
		}
		else if (event.key == 'z') {
			speed1y = -5;
		}
		else if (event.key == 's') {
			speed1y = 5;
		}
	});
	document.addEventListener('keyup', function(event) {
		if (event.key == 'ArrowUp') {
			speed2y = 0;
		}
		else if (event.key == 'ArrowDown') {
			speed2y = 0;
		}
		else if (event.key == 'z') {
			speed1y = 0;
		}
		else if (event.key == 's') {
			speed1y = 0;
		}
	});
	window.main = function () {
		window.requestAnimationFrame(main);
		contexte.clearRect(0, 0, canevas.width, canevas.height);
		pos1y += speed1y;
		pos2y += speed2y;
		contexte.drawImage(player1, pos1x, pos1y);
		contexte.drawImage(player2, pos2x, pos2y);
		contexte.drawImage(ball, bally, ballx);

	};
	main();
</script>


</body>
</html>
